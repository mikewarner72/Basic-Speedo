<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="SpeedoClock.png">
    <style>
        body { background: #111; color: #eee; font-family: -apple-system, sans-serif; padding: 15px; margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .box { background: #222; padding: 12px; border-radius: 8px; border: 1px solid #444; }
        label { display: block; font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        input { width: 85%; background: #333; color: #fff; border: 1px solid #555; padding: 8px; font-size: 18px; border-radius: 4px; }
        .val { font-size: 22px; font-weight: bold; color: #0f0; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 20px; align-items: stretch; }
        button#startBtn { flex-grow: 1; padding: 20px; font-size: 20px; font-weight: bold; border-radius: 8px; border: none; background: #007bff; color: white; }
        button#startBtn.active { background: #dc3545; }
        .gear-btn { width: 60px; background: #444; border: 1px solid #666; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; }
        
        .speed-container { text-align: center; margin-top: 10px; padding: 15px; background: #222; border-radius: 12px; border: 2px solid #444; }
        #outCurrentSpeed { font-size: 64px; font-weight: 900; transition: color 0.3s; line-height: 1; }
        
        #confContainer { text-align: center; margin: 10px 0; }
        #confValue { font-weight: bold; font-size: 18px; }
        
        #settingsPanel { display: none; background: #333; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #007bff; position: absolute; top: 15px; left: 15px; right: 15px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 12px; }
        .setting-row input { width: 70px; font-size: 14px; padding: 4px; }

        #log { background: #000; color: #0f0; font-family: monospace; font-size: 10px; padding: 10px; height: 120px; overflow-y: auto; border: 1px solid #333; border-radius: 4px; margin-top: 20px; }
        .log-err { color: #ff4444; }
        .log-warn { color: #ffaa00; }
        .finished { border-color: #0f0 !important; }
    </style>
</head>
<body>

    <div class="grid">
        <div class="box"><label>Zone Dist (km)</label><input type="number" id="inputDist" value="5.0" step="0.1" onchange="saveSettings()"></div>
        <div class="box"><label>Target (km/h)</label><input type="number" id="inputTarget" value="80" step="1" onchange="saveSettings()"></div>
    </div>

    <div class="controls">
        <button id="startBtn" onclick="toggleStart()">START ZONE</button>
        <button class="gear-btn" onclick="toggleSettings()">⚙️</button>
    </div>

    <div id="settingsPanel">
        <h3 style="margin-top:0">Settings</h3>
        <div class="setting-row"><span>Accuracy Limit (m)</span><input type="number" id="setAcc" value="25" onchange="saveSettings()"></div>
        <div class="setting-row"><span>Missed Ping (sec)</span><input type="number" id="setMiss" value="5" onchange="saveSettings()"></div>
        <div class="setting-row"><span>Speed Jump (km/h/s)</span><input type="number" id="setJump" value="10" onchange="saveSettings()"></div>
        <div class="setting-row"><span>Log Buffer Size</span><input type="number" id="setLogSize" value="50" onchange="saveSettings()"></div>
        <button style="width:100%; padding: 10px; background: #007bff; color:white; border:none; border-radius:4px; margin-top:10px" onclick="toggleSettings()">Save & Close</button>
    </div>

    <div id="confContainer">
        <span style="color: #888; font-size: 12px;">Confidence:</span>
        <span id="confValue">100%</span>
    </div>

    <div class="grid">
        <div class="box"><label>Travelled</label><div class="val" id="outDistTrav">0.00</div></div>
        <div class="box"><label>Remaining</label><div class="val" id="outDistRem">0.00</div></div>
        <div class="box"><label>Avg Speed</label><div class="val" id="outAvgSoFar">0.0</div></div>
        <div class="box"><label>Req. Speed</label><div class="val highlight" id="outReqSpeed">0.0</div></div>
    </div>

    <div class="speed-container" id="speedBox">
        <label>Current Speed</label>
        <div id="outCurrentSpeed">0</div>
        <div style="color:#888; font-size:12px;">km/h</div>
    </div>

    <div id="log">--- System Ready ---<br></div>

    <script>
        let active = false;
        let isFinished = false;
        let startTime, lastTimestamp, lastPos, wakeLock = null;
        let travelledDist = 0;
        let totalPings = 0;
        let badPings = 0;

        window.onload = function() {
            const saved = localStorage.getItem('zoneTrackerSettings');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('inputDist').value = data.dist;
                document.getElementById('inputTarget').value = data.target;
                document.getElementById('setAcc').value = data.acc;
                document.getElementById('setMiss').value = data.miss;
                document.getElementById('setJump').value = data.jump;
                document.getElementById('setLogSize').value = data.logSize || 50;
            }
        };

        function saveSettings() {
            const data = {
                dist: document.getElementById('inputDist').value,
                target: document.getElementById('inputTarget').value,
                acc: document.getElementById('setAcc').value,
                miss: document.getElementById('setMiss').value,
                jump: document.getElementById('setJump').value,
                logSize: document.getElementById('setLogSize').value
            };
            localStorage.setItem('zoneTrackerSettings', JSON.stringify(data));
        }

        function addLog(msg, type = '') {
            const log = document.getElementById('log');
            const maxLines = parseInt(document.getElementById('setLogSize').value) || 50;
            const time = new Date().toLocaleTimeString().split(' ')[0];
            
            const newEntry = document.createElement('div');
            if(type) newEntry.className = type;
            newEntry.innerText = `[${time}] ${msg}`;
            
            log.appendChild(newEntry);
            
            // Circular buffer logic
            while (log.children.length > maxLines) {
                log.removeChild(log.firstChild);
            }
            
            log.scrollTop = log.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        function getHaversineDist(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } 
            catch (err) { addLog("WakeLock Failed", "log-err"); }
        }

        function toggleSettings() {
            const p = document.getElementById('settingsPanel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        function toggleStart() {
            const btn = document.getElementById('startBtn');
            if (!active) {
                clearLog(); // Clear on Start
                addLog("Tracking Started");
                startTime = lastTimestamp = performance.now();
                travelledDist = totalPings = badPings = 0;
                lastPos = null;
                active = true;
                isFinished = false;
                btn.innerText = "STOP";
                btn.classList.add('active');
                document.getElementById('speedBox').classList.remove('finished');
                requestWakeLock();
            } else {
                active = false;
                isFinished = false;
                btn.innerText = "START ZONE";
                btn.classList.remove('active');
                document.getElementById('speedBox').classList.remove('finished');
                if (wakeLock) { wakeLock.release(); wakeLock = null; }
                
                // Reset Displays
                document.getElementById('outDistTrav').innerText = "0.00";
                document.getElementById('outDistRem').innerText = "0.00";
                document.getElementById('outAvgSoFar').innerText = "0.0";
                document.getElementById('outReqSpeed').innerText = "0.0";
                document.getElementById('outCurrentSpeed').innerText = "0";
                document.getElementById('outCurrentSpeed').style.color = "#eee";
                document.getElementById('confValue').innerText = "100%";
                document.getElementById('confValue').style.color = "#eee";
                addLog("System Reset");
            }
        }

        navigator.geolocation.watchPosition((pos) => {
            if (!active) return;
            const currentSpeedKMH = pos.coords.speed ? pos.coords.speed * 3.6 : 0;
            const now = performance.now();

            if (isFinished) {
                document.getElementById('outCurrentSpeed').innerText = Math.round(currentSpeedKMH);
                return;
            }

            totalPings++;
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const acc = pos.coords.accuracy;

            const limitAcc = parseFloat(document.getElementById('setAcc').value);
            const limitMiss = parseFloat(document.getElementById('setMiss').value);
            const limitJump = parseFloat(document.getElementById('setJump').value);

            if (acc > limitAcc) {
                badPings++;
                addLog(`Rejected: Low Accuracy (${acc.toFixed(0)}m)`, "log-warn");
                updateUI(currentSpeedKMH, now);
                return;
            }

            const deltaSec = (now - lastTimestamp) / 1000;
            if (deltaSec > limitMiss && totalPings > 1) {
                badPings++;
                addLog(`Gap Detected: ${deltaSec.toFixed(1)}s`, "log-err");
            }

            if (lastPos && pos.coords.speed !== null) {
                const prevSpeed = lastPos.speed || 0;
                const accel = Math.abs(currentSpeedKMH - (prevSpeed * 3.6)) / deltaSec;
                if (accel > limitJump) {
                    badPings++;
                    addLog(`Rejected: Speed Jump`, "log-warn");
                    updateUI(currentSpeedKMH, now);
                    return;
                }
            }

            if (lastPos) {
                const d = getHaversineDist(lastPos.lat, lastPos.lon, lat, lon);
                travelledDist += d;
            }

            lastPos = { lat, lon, speed: pos.coords.speed };
            lastTimestamp = now;

            const totalDistGoal = parseFloat(document.getElementById('inputDist').value);
            if (travelledDist >= totalDistGoal) {
                isFinished = true;
                travelledDist = totalDistGoal;
                addLog("ZONE COMPLETE", "log-warn");
                document.getElementById('speedBox').classList.add('finished');
            }

            updateUI(currentSpeedKMH, now);

        }, (err) => addLog("GPS Error", "log-err"), 
        { enableHighAccuracy: true, maximumAge: 0 });

        function updateUI(currentSpeed, now) {
            const totalDistGoal = parseFloat(document.getElementById('inputDist').value);
            const targetKMH = parseFloat(document.getElementById('inputTarget').value);
            const hoursElapsed = (now - startTime) / (1000 * 60 * 60);
            const remainingDist = Math.max(0, totalDistGoal - travelledDist);
            const avgSpeed = hoursElapsed > 0 ? (travelledDist / hoursElapsed) : 0;
            
            const remainingTime = (totalDistGoal / targetKMH) - hoursElapsed;
            let reqSpeed = remainingTime > 0 ? (remainingDist / remainingTime) : (remainingDist > 0 ? 999 : 0);

            const conf = Math.max(0, Math.round(((totalPings - badPings) / totalPings) * 100));
            const confEl = document.getElementById('confValue');
            confEl.innerText = conf + "%";
            confEl.style.color = conf > 90 ? "#0f0" : (conf > 70 ? "#ffa500" : "#ff4444");

            document.getElementById('outDistTrav').innerText = travelledDist.toFixed(2);
            document.getElementById('outDistRem').innerText = remainingDist.toFixed(2);
            document.getElementById('outAvgSoFar').innerText = avgSpeed.toFixed(1);
            document.getElementById('outReqSpeed').innerText = isFinished ? "0.0" : (reqSpeed > 250 ? "---" : reqSpeed.toFixed(1));

            const speedEl = document.getElementById('outCurrentSpeed');
            speedEl.innerText = Math.round(currentSpeed);
            
            if (isFinished) {
                speedEl.style.color = "#eee";
            } else {
                if (reqSpeed === 999 || currentSpeed > reqSpeed + 1) speedEl.style.color = "#ff4444";
                else if (currentSpeed < reqSpeed - 1) speedEl.style.color = "#ffa500";
                else speedEl.style.color = "#0f0";
            }
        }
    </script>
</body>
</html>
